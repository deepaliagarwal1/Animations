<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Gallery</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    video { max-width: 100%; height: auto; margin-top: 10px; }
    select { padding: 5px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>My Video Gallery</h1>

  <label for="videoSelect">Choose a video:</label>
  <select id="videoSelect">
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr20_clustered.mp4">Video 1</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr20_fibonacci.mp4">Video 2</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr20_unif.mp4">Video 3</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr40_clustered.mp4">Video 4</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr40_fibonacci.mp4">Video 5</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr40_unif.mp4">Video 6</option>
  </select>

  <video id="player" controls autoplay muted>
    <source src="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr20_clustered.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <script>
    const player = document.getElementById('player');
    const select = document.getElementById('videoSelect');

    select.addEventListener('change', () => {
      player.src = select.value; // use raw URL
      player.load();             // reload video
      player.play();             // autoplay new video
    });
  </script>
</body>
</html>
