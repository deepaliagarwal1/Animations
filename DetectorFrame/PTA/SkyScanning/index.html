<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo: Visualizing Point Spread Function Sweep Across the Sky with Pulsar Configurations</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    video, img { max-width: 100%; height: auto; margin-top: 10px; }
    select { padding: 5px; font-size: 16px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Demo: Visualizing Point Spread Function Sweep Across the Sky with Pulsar Configurations</h1>

  <!-- Video Section -->
  <label for="videoSelect">Choose a video:</label>
  <select id="videoSelect">
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr20_clustered.mp4">PSR_20_Clustered</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr20_fibonacci.mp4">PSR_20_Fibonacci</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr20_unif.mp4">PSR_20_StatUniform</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr40_clustered.mp4">PSR_40_Clustered</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr40_fibonacci.mp4">PSR_40_Fibonacci</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr40_unif.mp4">PSR_40_StatUniform</option>
  </select>

  <video id="player" controls autoplay muted>
    <source src="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Videos/psr20_clustered.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Image Section -->
  <hr> <!-- optional separator -->
  <h2>Choose an image:</h2>
  <label for="imageSelect">Select Image:</label>
  <select id="imageSelect">
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Images/psr20_Clustered.jpg">PSR_20_Clustered</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Images/psr20_fibonacci.jpg">PSR_20_Fibonacci</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Images/psr20_unif.jpg">PSR_20_StatUniform</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Images/psr40_Clustered.jpg">PSR_40_Clustered</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Images/psr40_fibonacci.jpg">PSR_40_Fibonacci</option>
    <option value="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/DetectorFrame/PTA/SkyScanning/Images/psr40_unif.jpg">PSR_40_StatUniform</option>
  </select>

  <br><br>
  <img id="displayImage" src="https://raw.githubusercontent.com/deepaliagarwal1/Animations/main/PTA/SkyScanning/Images/psr20_Clustered.jpg" alt="Selected Image">

  <!-- Scripts -->
  <script>
    // Video switching
    const player = document.getElementById('player');
    const select = document.getElementById('videoSelect');
    select.addEventListener('change', () => {
      player.src = select.value;
      player.load();
      player.play();
    });

    // Image switching
    const imageSelect = document.getElementById('imageSelect');
    const displayImage = document.getElementById('displayImage');
    imageSelect.addEventListener('change', () => {
      displayImage.src = imageSelect.value;
    });
  </script>
</body>
</html>
